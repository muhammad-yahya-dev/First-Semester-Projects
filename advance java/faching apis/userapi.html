<!doctype html>
<html lang="en">
    <head>
        <title>Faching Data From api</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body>
        <header>
            <!-- place navbar here -->
        </header>
        <main>
            <!-- .container>.row>.col-lg-3.col-md-6.col-sm-12*4 -->
            <div class="container">
                <div class="row" id="user">
                    
                </div>
            </div>
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>

        <script>
            let userlist = document.getElementById("user");
            async function getdata(){
                let data = await fetch("https://dummyjson.com/users?limit=100");
                let response = await data.json();
                let users = await response.users;
                console.log(users);

                users.forEach(element => {
                    userlist.innerHTML += `
                    <div class="col-lg-3 col-lg-3 col-md-6 col-sm-12">
                    <div class="card" style="width: 18rem;">
  <img src="${element.image}" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-titel">First Name:${element.firstName}</h5>
    <h5 class="card-titel">Last Name:${element.lastName}</h5>
    <h5 class="card-titel">Age:${element.age}</h5>
   
  </div>
</div>
      
     </div>
                    </div>
                    `;
                });
            }
            getdata();

        </script>

    </body>
</html>
