<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Month Switcher</title>
</head>
<body>
    <script>
        let Month = +prompt("Please enter the current Islamic month number (1-12):"); 

        switch (Month) {
            case 1:
                alert("It's Muharram (محرم)!");
                break;
            case 2:
                alert("It's Safar (صفر)!");
                break;
            case 3:
                alert("It's Rabi' al-awwal (ربيع الأول)!");
                break;
            case 4:
                alert("It's Rabi' al-Thani!");
                break;
            case 5:
                alert("It's Jumada al-Awwal!");
                break;
            case 6:
                alert("It's Jumada al-Thani!");
                break;
            case 7:
                alert("It's Rajab!");
                break;
            case 8:
                alert("It's Sha'ban!");
                break;
            case 9:
                alert("It's Ramadan!");
                break;
            case 10:
                alert("It's Shawwal!");
                break;
            case 11:
                alert("It's Dhu al-Qi'dah!");
                break;
            case 12:
                alert("It's Dhu al-Hijjah!");
                break;
            default:
                alert("Invalid Entry! Please enter a number between 1 and 12.");
        }
    </script>
</body>
</html>
