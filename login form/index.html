<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0d1a26;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            color: #fff;
            border-radius: 10px;
            padding: 30px 40px;
            position: relative;
            overflow: hidden;
        }

        .form-box {
            display: none;
        }

        .form-box.active {
            display: block;
        }

        h1 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 25px;
            color: #4CAF50;
            text-shadow: 0 0 5px rgba(76, 175, 80, 0.8);
        }

        .input-box {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 25px 0;
        }

        .input-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            font-size: 16px;
            color: #fff;
            padding: 0 45px 0 20px;
            transition: border-color 0.3s ease;
        }

        .input-box input::placeholder {
            color: #ccc;
        }

        .input-box input:focus {
            border-color: #4CAF50;
        }

        .input-box .bx {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 14.5px;
            margin: -15px 0 15px;
        }

        .remember-forgot label input {
            accent-color: #4CAF50;
            margin-right: 5px;
        }

        .remember-forgot a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #4CAF50;
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            height: 45px;
            background: #4CAF50;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            font-size: 16px;
            color: #0d1a26;
            font-weight: 600;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background: #5cb860;
            transform: scale(1.02);
        }

        .link-text {
            font-size: 14.5px;
            text-align: center;
            margin-top: 20px;
        }

        .link-text p a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: color 0.3s ease;
        }

        .link-text p a:hover {
            text-decoration: underline;
            color: #76ff7a;
        }

        @media (max-width: 420px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="form-box login-form active" id="loginForm">
            <form id="LoginFormSubmit">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" id="loginUser" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="loginPass" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" onclick="alert('Password reset link sent to registered email!')">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="link-text">
                    <p>Don't have an account? <a href="#" id="showRegister">Register</a></p>
                </div>
            </form>
        </div>

        <div class="form-box register-form" id="registerForm">
            <form id="RegisterFormSubmit">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" id="regUser" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" id="regEmail" placeholder="Email Address" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="regPass" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox" required> I agree to terms</label>
                </div>
                <button type="submit" class="btn">Register</button>
                <div class="link-text">
                    <p>Already have an account? <a href="#" id="showLogin">Login</a></p>
                </div>
            </form>
        </div>

    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showRegisterBtn = document.getElementById('showRegister');
        const showLoginBtn = document.getElementById('showLogin');

        showRegisterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.remove('active');
            registerForm.classList.add('active');
        });

        showLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.remove('active');
            loginForm.classList.add('active');
        });

        document.getElementById('RegisterFormSubmit').addEventListener('submit', (e) => {
            e.preventDefault();
            
            let username = document.getElementById('regUser').value;
            let pass = document.getElementById('regPass').value;

            if (pass.length < 6) {
                alert("Registration Failed!\nPassword must be at least 6 characters long.");
                return;
            }
            
            alert("Registration Successful!\nWelcome, " + username + ".\nYou can log in now.");
            document.getElementById('RegisterFormSubmit').reset();
            registerForm.classList.remove('active');
            loginForm.classList.add('active');
        });

        document.getElementById('LoginFormSubmit').addEventListener('submit', (e) => {
            e.preventDefault();
            
            let username = document.getElementById('loginUser').value;
            let pass = document.getElementById('loginPass').value;
            
            if (pass.length < 6) {
                alert("Access Denied!\nInvalid password length. Must be 6 or more characters.");
                document.getElementById('loginPass').focus();
                return;
            }

            alert("Login Successful!\nWelcome Back, " + username + "!");
        });
    </script>
</body>
</html>
